name: Build macOS Installer

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build .pkg installer
        run: |
          cd installer
          bash build-macos-pkg.sh

      # --- Code Signing & Notarization ---
      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          # Skip if no certificate configured
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "::warning::No signing certificate configured. Skipping code signing."
            echo "SIGNING_ENABLED=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "SIGNING_ENABLED=true" >> "$GITHUB_ENV"

          # Decode the .p12 certificate from base64
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"

          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Import the certificate
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/productsign \
            -T /usr/bin/pkgutil
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Save keychain path for cleanup
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          # Clean up certificate file
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Sign installer package
        if: env.SIGNING_ENABLED == 'true'
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          UNSIGNED="installer/build/macos/dist/OMEGA-Memory.pkg"
          SIGNED="installer/build/macos/dist/OMEGA-Memory-signed.pkg"

          productsign --sign "$MACOS_SIGNING_IDENTITY" "$UNSIGNED" "$SIGNED"
          mv "$SIGNED" "$UNSIGNED"

          echo "Signature applied. Verifying..."
          pkgutil --check-signature "$UNSIGNED"

      - name: Notarize installer package
        if: env.SIGNING_ENABLED == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PKG="installer/build/macos/dist/OMEGA-Memory.pkg"

          echo "Submitting for notarization..."
          xcrun notarytool submit "$PKG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$PKG"

          echo "Verifying notarized package..."
          spctl --assess --type install "$PKG"

      - name: Clean up keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: |
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
      # --- End Code Signing ---

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: omega-macos-pkg
          path: installer/build/macos/dist/OMEGA-Memory.pkg

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" "installer/build/macos/dist/OMEGA-Memory.pkg" --clobber
