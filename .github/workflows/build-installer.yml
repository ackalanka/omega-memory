name: Build Windows Installer

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download Python 3.12 embeddable
        shell: pwsh
        run: |
          $url = "https://www.python.org/ftp/python/3.12.8/python-3.12.8-embed-amd64.zip"
          $dest = "installer/build/python.zip"
          New-Item -ItemType Directory -Force -Path "installer/build/python"
          Invoke-WebRequest -Uri $url -OutFile $dest
          Expand-Archive -Path $dest -DestinationPath "installer/build/python" -Force
          Remove-Item $dest

      - name: Download get-pip.py
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "installer/build/get-pip.py"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      # --- Code Signing Setup ---
      - name: Import signing certificate
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        shell: pwsh
        run: |
          if (-not $env:WINDOWS_CERTIFICATE) {
            Write-Warning "No signing certificate configured. Skipping code signing."
            echo "SIGNING_ENABLED=false" >> $env:GITHUB_ENV
            return
          }
          echo "SIGNING_ENABLED=true" >> $env:GITHUB_ENV

          # Decode the .pfx certificate from base64
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = Join-Path $env:RUNNER_TEMP "signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          echo "CERT_PATH=$certPath" >> $env:GITHUB_ENV
      # --- End Code Signing Setup ---

      - name: Build installer
        env:
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        shell: pwsh
        run: |
          $isccArgs = @("installer/omega-setup.iss")

          # If certificate is available, configure Inno Setup to sign embedded executables
          if ($env:SIGNING_ENABLED -eq "true") {
            $certPath = $env:CERT_PATH
            $signCmd = "signtool sign /fd sha256 /tr http://timestamp.digicert.com /td sha256 /f `"$certPath`" /p `"$env:WINDOWS_CERTIFICATE_PWD`" `$f"
            $isccArgs = @("/DSIGN", "/Ssigntool=$signCmd") + $isccArgs
          }

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" @isccArgs

      - name: Sign installer executable
        if: env.SIGNING_ENABLED == 'true'
        env:
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        shell: pwsh
        run: |
          $certPath = $env:CERT_PATH

          # Sign the final installer .exe
          & signtool sign `
            /fd sha256 `
            /tr http://timestamp.digicert.com `
            /td sha256 `
            /f "$certPath" `
            /p "$env:WINDOWS_CERTIFICATE_PWD" `
            "installer/dist/omega-setup.exe"

          echo "Signature applied. Verifying..."
          & signtool verify /pa "installer/dist/omega-setup.exe"

      - name: Clean up certificate
        if: always()
        shell: pwsh
        run: |
          $certPath = $env:CERT_PATH
          if ($certPath -and (Test-Path $certPath)) {
            Remove-Item -Force $certPath
          }
      # --- End Code Signing ---

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: omega-setup
          path: installer/dist/omega-setup.exe

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        shell: pwsh
        run: |
          gh release upload "$env:RELEASE_TAG" "installer/dist/omega-setup.exe" --clobber
